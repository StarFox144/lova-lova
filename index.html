<style>
  *, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; height: 100%; }
  html { height: -webkit-fill-available; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
    overflow: hidden;
    min-height: 100vh;
    min-height: -webkit-fill-available;
    min-height: 100dvh;
    overscroll-behavior: none;
    padding-top: env(safe-area-inset-top, 0px);
    padding-bottom: env(safe-area-inset-bottom, 0px);
    transition: background 0.8s ease;
    -webkit-font-smoothing: antialiased;
    touch-action: manipulation;
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
  }

  :root {
    --bg: #faf4ee;
    --bg-hi: #fbe9e2;
    --ink: #b71d3c;
    --accent: #e23d5a;
    --beat-dur: 1.6s;
    --beat-delay: 4s;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      color-scheme: dark;
      --bg: #0d0a0c;
      --bg-hi: #231419;
      --ink: #e23a55;
      --accent: #ff6b8a;
    }
  }
  @media (prefers-color-scheme: light) {
    :root { color-scheme: light; }
  }

  .stage {
    position: fixed;
    inset: 0;
    min-height: 100vh;
    min-height: -webkit-fill-available;
    min-height: 100dvh;
    display: grid;
    place-items: center;
    background: radial-gradient(ellipse 120% 120% at 50% 40%, var(--bg-hi) 0%, var(--bg) 60%);
    transition: background 0.8s ease;
  }

  .heart-wrap {
    position: relative;
    width: min(92vw, 86vh * (800/720));
    aspect-ratio: 800 / 720;
    filter: drop-shadow(0 30px 60px rgba(0,0,0,.08));
    opacity: 0;
    transform: scale(.4);
    transform-origin: center 56%;
    transition: opacity 1.4s ease, transform 1.6s cubic-bezier(.2,.8,.2,1);
  }
  body.phase-heart .heart-wrap {
    opacity: 1;
    transform: scale(1);
  }

  .heart-svg { width: 100%; height: 100%; display: block; overflow: visible; }

  .beat {
    transform-origin: 400px 380px;
    animation: beat var(--beat-dur) ease-in-out var(--beat-delay) infinite;
    will-change: transform;
  }
  @keyframes beat {
    0%, 18%, 36%, 100% { transform: scale(1); }
    10%   { transform: scale(1.018); }
    26%   { transform: scale(1.028); }
  }

  .outline {
    fill: none;
    stroke: var(--ink);
    stroke-width: 1.25;
    stroke-linecap: round;
    stroke-linejoin: round;
    stroke-dasharray: 2350;
    stroke-dashoffset: 2350;
    animation: draw 3.4s cubic-bezier(.65,.05,.36,1) forwards;
    opacity: .55;
  }
  @keyframes draw { to { stroke-dashoffset: 0; } }

  .row {
    opacity: 0;
    animation: fadeRow .9s ease-out forwards;
  }
  @keyframes fadeRow {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: var(--row-op, 1); transform: translateY(0); }
  }

  .border-text {
    opacity: 0;
    animation: fadeIn 1.2s ease 3.2s forwards;
    letter-spacing: .12em;
  }
  @keyframes fadeIn { to { opacity: 1; } }

  .row, .outline, .border-text { animation-play-state: paused; }
  body.phase-heart .row,
  body.phase-heart .outline,
  body.phase-heart .border-text { animation-play-state: running; }

  .page-title, .page-foot { opacity: 0; transition: opacity 1.2s ease 1s; }
  body.phase-heart .page-title { opacity: .55; }
  body.phase-heart .page-foot  { opacity: .35; }

  .page-title {
    position: fixed; top: calc(24px + env(safe-area-inset-top, 0px)); left: 28px; right: 28px;
    display: flex; justify-content: space-between; align-items: baseline;
    pointer-events: none;
    color: var(--ink);
    z-index: 5;
  }
  .page-title .brand {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 18px;
    letter-spacing: .02em;
  }
  .page-title .meta {
    font-size: 11px;
    letter-spacing: .22em;
    text-transform: uppercase;
    font-weight: 400;
  }
  .page-foot {
    position: fixed; bottom: calc(22px + env(safe-area-inset-bottom, 0px)); left: 0; right: 0;
    text-align: center; color: var(--ink);
    font-size: 10px; letter-spacing: .3em; text-transform: uppercase;
    pointer-events: none;
    z-index: 5;
  }

  .intro {
    position: fixed; inset: 0;
    display: grid; place-items: center;
    background: radial-gradient(ellipse 130% 130% at 50% 50%, var(--bg-hi) 0%, var(--bg) 75%);
    z-index: 20;
    text-align: center;
    transition: opacity .9s ease, transform 1.2s cubic-bezier(.65,.05,.36,1), filter .9s ease;
  }
  .intro.is-leaving {
    opacity: 0;
    transform: scale(1.06);
    filter: blur(8px);
    pointer-events: none;
  }

  .intro-inner {
    display: flex; flex-direction: column; align-items: center; gap: 26px;
    padding: 0 24px;
    max-width: 640px;
  }

  .intro-eyebrow {
    font-size: 11px;
    letter-spacing: .42em;
    text-transform: uppercase;
    color: var(--ink);
    opacity: 0;
    animation: introUp .9s ease .2s forwards;
  }

  .intro-title {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 500;
    font-size: clamp(46px, 9vw, 108px);
    line-height: .98;
    color: var(--ink);
    margin: 0;
    letter-spacing: -.01em;
    opacity: 0;
    animation: introUp 1.1s cubic-bezier(.2,.7,.2,1) .4s forwards;
  }
  .intro-title .amp {
    display: inline-block;
    color: var(--accent);
    transform: translateY(.08em);
  }

  .intro-sub {
    font-weight: 300;
    font-size: 15px;
    line-height: 1.6;
    color: var(--ink);
    opacity: 0;
    max-width: 360px;
    animation: introUp .9s ease .7s forwards;
  }
  .intro-sub strong { font-weight: 500; opacity: .85; }

  .intro-cta {
    position: relative;
    appearance: none;
    border: 1px solid var(--ink);
    background: transparent;
    color: var(--ink);
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: .28em;
    text-transform: uppercase;
    padding: 16px 34px 15px;
    cursor: pointer;
    touch-action: manipulation;
    border-radius: 999px;
    overflow: hidden;
    transition: color .35s ease, transform .25s ease, border-color .35s ease;
    opacity: 0;
    animation: introUp .9s ease 1s forwards;
    margin-top: 6px;
  }
  .intro-cta::before {
    content: "";
    position: absolute; inset: 0;
    background: var(--ink);
    transform: scaleX(0);
    transform-origin: left center;
    transition: transform .45s cubic-bezier(.65,.05,.36,1);
    z-index: -1;
  }
  .intro-cta:hover { color: var(--bg); transform: translateY(-1px); }
  .intro-cta:hover::before { transform: scaleX(1); }
  .intro-cta:active { transform: translateY(0); }
  .intro-cta .ico {
    display: inline-block;
    margin-left: 10px;
    transition: transform .35s ease;
  }
  .intro-cta:hover .ico { transform: translateX(4px); }

  .intro-seed {
    width: 14px; height: 14px;
    background: var(--accent);
    border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
    position: relative;
    transform: rotate(-45deg);
    margin-bottom: 4px;
    opacity: 0;
    animation: introUp .9s ease 0s forwards, seedBeat 1.4s ease-in-out 1.4s infinite;
  }
  .intro-seed::before, .intro-seed::after {
    content: ""; position: absolute;
    width: 14px; height: 14px;
    background: inherit;
    border-radius: 50%;
  }
  .intro-seed::before { top: -7px; left: 0; }
  .intro-seed::after  { left: 7px; top: 0; }
  @keyframes seedBeat {
    0%, 100% { transform: rotate(-45deg) scale(1); }
    20%      { transform: rotate(-45deg) scale(1.18); }
    40%      { transform: rotate(-45deg) scale(.96); }
    60%      { transform: rotate(-45deg) scale(1.1); }
  }

  @keyframes introUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .petal {
    position: fixed;
    width: 8px; height: 8px;
    background: var(--accent);
    border-radius: 50% 0 50% 50%;
    opacity: 0;
    pointer-events: none;
    animation: float 14s linear infinite;
    z-index: 1;
  }
  @keyframes float {
    0%   { transform: translateY(110vh) rotate(0deg) scale(.6); opacity: 0; }
    10%  { opacity: .35; }
    90%  { opacity: .35; }
    100% { transform: translateY(-20vh) rotate(540deg) scale(1); opacity: 0; }
  }

  .font-serif  { font-family: 'Cormorant Garamond', 'Times New Roman', serif; font-style: italic; font-weight: 500; }
  .font-script { font-family: 'Caveat', 'Brush Script MT', cursive; font-weight: 500; }
  .font-sans   { font-family: 'Inter', system-ui, sans-serif; font-weight: 400; letter-spacing: .02em; }

  @media (hover: none) and (pointer: coarse) {
    .intro-cta:hover { color: var(--ink); transform: none; }
    .intro-cta:hover::before { transform: scaleX(0); }
    .intro-cta:active {
      color: var(--bg);
      transform: scale(0.97);
      transition-duration: 0.1s;
    }
    .intro-cta:active::before {
      transform: scaleX(1);
      transition-duration: 0.1s;
    }
  }

  @media (prefers-reduced-motion: reduce) {
    .intro-seed, .intro-eyebrow, .intro-title, .intro-sub, .intro-cta {
      opacity: 1 !important;
      transform: none !important;
      animation: none !important;
    }
  }

  @media (max-width: 768px) {
    :root { --beat-dur: 1.8s; --beat-delay: 5s; }

    .heart-wrap {
      width: min(95vw, 95vh * (800/720));
      filter: drop-shadow(0 20px 40px rgba(0,0,0,.12));
    }

    .intro-title { font-size: clamp(32px, 7vw, 64px); line-height: 1.1; }
    .intro-sub { font-size: 13px; line-height: 1.5; }
    .intro-inner { padding: 20px; gap: 20px; }
    .intro-cta { padding: 14px 28px 13px; border-width: 1.5px; font-size: 11px; min-height: 44px; }

    .page-title {
      top: calc(16px + env(safe-area-inset-top, 0px));
      left: calc(16px + env(safe-area-inset-left, 0px));
      right: calc(16px + env(safe-area-inset-right, 0px));
      gap: 8px;
    }
    .page-title .brand { font-size: 14px; }
    .page-title .meta { font-size: 9px; }
    .page-foot { bottom: 16px; font-size: 9px; letter-spacing: .2em; }
  }

  @media (max-width: 480px) {
    :root { --beat-dur: 2s; --beat-delay: 6s; }

    .heart-wrap {
      width: min(98vw, 98vh * (800/720));
      margin: 20px auto;
      filter: drop-shadow(0 12px 24px rgba(0,0,0,.08));
    }

    .intro-title { font-size: clamp(24px, 6vw, 48px); margin: 0; }
    .intro-sub { font-size: 12px; line-height: 1.4; }
    .intro-cta { padding: 12px 22px 11px; font-size: 10px; letter-spacing: .2em; }

    .page-title { flex-direction: column; gap: 4px; }
    .page-title .brand { font-size: 12px; }
    .page-title .meta { font-size: 8px; }
  }

  @media (orientation: landscape) and (max-height: 600px) {
    .intro { padding: 16px; }
    .intro-inner { gap: 12px; padding: 12px; }
    .intro-title { font-size: clamp(20px, 5vw, 48px); line-height: 1.1; }
    .intro-sub { display: none; }
    .intro-eyebrow { font-size: 9px; margin-bottom: 4px; }
    .page-title { top: 12px; left: 16px; right: 16px; }
    .page-foot { bottom: 12px; font-size: 8px; }
    .heart-wrap { max-height: 80vh; width: auto; }
  }

  #error-bubble {
    position: fixed;
    right: 16px;
    bottom: 16px;
    z-index: 99999;
    max-width: calc(100% - 32px);
    max-height: 35vh;
    overflow: auto;
    padding: 14px 16px;
    border-radius: 16px;
    background: rgba(0,0,0,.86);
    color: #fff;
    font-size: 13px;
    line-height: 1.4;
    white-space: pre-wrap;
    display: none;
  }
</style>

<body>

<!-- INTRO SCENE — shown first; click button to reveal heart -->
<div class="intro" id="intro">
  <div class="intro-inner">
    <div class="intro-seed" aria-hidden="true"></div>
    <div class="intro-eyebrow">a small thing · made for you</div>
    <h1 class="intro-title">
      Three words,<br/>
      <span class="amp">one</span> shape.
    </h1>
    <p class="intro-sub">
      Press the button. The page will quiet, and a heart will draw itself —
      letter by letter — from the only sentence that matters.
    </p>
    <button type="button" class="intro-cta" id="reveal-btn" aria-label="Reveal the heart">
      Reveal it <span class="ico" aria-hidden="true">→</span>
    </button>
  </div>
</div>

<div class="page-title">
  <div class="brand">a letter, in one shape</div>
  <div class="meta">∞ · for you</div>
</div>

<div class="stage" id="stage">
  <div id="root"></div>
</div>

<div class="page-foot">made with care — drag tweaks to remix</div>

<script>
  // Intro → heart transition. Outside React so it runs immediately,
  // before React has finished hydrating.
  (function(){
    var btn   = document.getElementById('reveal-btn');
    var intro = document.getElementById('intro');
    function reveal(){
      if (document.body.classList.contains('phase-heart')) return;
      intro.classList.add('is-leaving');
      // Start heart reveal slightly before the intro fully clears
      setTimeout(function(){
        document.body.classList.add('phase-heart');
      }, 320);
      setTimeout(function(){
        intro.style.display = 'none';
      }, 1300);
    }
    btn.addEventListener('click', reveal);
    // Allow Enter / Space anywhere on intro
    document.addEventListener('keydown', function(e){
      if (document.body.classList.contains('phase-heart')) return;
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); reveal(); }
    });
  })();
</script>
<script>
  function __showPageError(message) {
    var bubble = document.getElementById('error-bubble');
    if (!bubble) {
      bubble = document.createElement('div');
      bubble.id = 'error-bubble';
      document.body.appendChild(bubble);
    }
    bubble.textContent = 'Page error: ' + message;
    bubble.style.display = 'block';
  }
  window.addEventListener('error', function (event) {
    __showPageError(event.message + ' (' + event.filename + ':' + event.lineno + ')');
  });
  window.addEventListener('unhandledrejection', function (event) {
    var reason = event.reason && event.reason.message ? event.reason.message : String(event.reason);
    __showPageError('Unhandled promise rejection: ' + reason);
  });
</script>
<script>
  // Fallback: if CSS animations are blocked, force intro visible after 2s
  setTimeout(function() {
    var sel = '.intro-seed,.intro-eyebrow,.intro-title,.intro-sub,.intro-cta';
    var els = document.querySelectorAll(sel);
    for (var i = 0; i < els.length; i++) {
      if (parseFloat(window.getComputedStyle(els[i]).opacity) < 0.5) {
        els[i].style.setProperty('opacity', '1', 'important');
        els[i].style.setProperty('transform', 'translateY(0)');
        els[i].style.setProperty('animation', 'none', 'important');
      }
    }
  }, 2000);
</script>

function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title = 'Tweaks', noDeckControls = false, children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const hasDeckStage = React.useMemo(
    () => typeof document !== 'undefined' && !!document.querySelector('deck-stage'),
    [],
  );
  const [railEnabled, setRailEnabled] = React.useState(
    () => hasDeckStage && !!document.querySelector('deck-stage')?._railEnabled,
  );
  React.useEffect(() => {
    if (!hasDeckStage || railEnabled) return undefined;
    const onMsg = (e) => {
      if (e.data && e.data.type === '__omelette_rail_enabled') setRailEnabled(true);
    };
    window.addEventListener('message', onMsg);
    return () => window.removeEventListener('message', onMsg);
  }, [hasDeckStage, railEnabled]);
  const [railVisible, setRailVisible] = React.useState(() => {
    try { return localStorage.getItem('deck-stage.railVisible') !== '0'; } catch (e) { return true; }
  });
  const toggleRail = (on) => {
    setRailVisible(on);
    window.postMessage({ type: '__deck_rail_visible', on }, '*');
  };
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
          {hasDeckStage && railEnabled && !noDeckControls && (
            <TweakSection label="Deck">
              <TweakToggle label="Thumbnail rail" value={railVisible} onChange={toggleRail} />
            </TweakSection>
          )}
        </div>
      </div>
    </>
  );
}

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});
</script>
<script type="text/babel" data-presets="react">

  }
  return 'ardent';

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "phrase": "I love you",
  "paletteName": getDefaultPalette(),
  "density": 26,

  const adjustedDensity = isMobile && density > 30 ? Math.floor(density * 0.85) : density;

  const rows = useMemo(() => {

    const step   = (yEnd - yStart) / (adjustedDensity - 1);
    for (let i = 0; i < adjustedDensity; i++) {
      arr.push({ i, y: yStart + i * step });
    }
    return arr;
  }, [adjustedDensity]);

  const fontSize = Math.max(10, Math.min(40, 720 / adjustedDensity * 0.82));
  const centerIdx = Math.floor(adjustedDensity / 2);

  const fontClass =
    t.fontStyle === "script" ? "font-script" :
    t.fontStyle === "sans"   ? "font-sans"   :
                               "font-serif";

  const letterSpacing =
    t.fontStyle === "script" ? ".02em" :
    t.fontStyle === "sans"   ? ".04em" :
                               ".01em";

  return (
    <>
      <div className="heart-wrap" aria-label={`A heart composed of the words "${phrase}"`}>
        <svg className="heart-svg" viewBox="0 0 800 720" preserveAspectRatio="xMidYMid meet">
          <defs>
            <clipPath id="heart-clip">
              <path d={HEART_PATH} />
            </clipPath>
            <linearGradient id="row-grad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%"   stopColor={palette.ink} stopOpacity="0.78" />
              <stop offset="50%"  stopColor={palette.ink} stopOpacity="1" />
              <stop offset="100%" stopColor={palette.accent} stopOpacity="0.9" />
            </linearGradient>
            <radialGradient id="heart-inner" cx="50%" cy="42%" r="60%">
              <stop offset="0%"  stopColor={palette.bgHi} stopOpacity="1" />
              <stop offset="100%" stopColor={palette.bg}   stopOpacity="0" />
            </radialGradient>
            <path id="border-curve" d={BORDER_PATH} />
          </defs>

          <g className={t.showBeat ? "beat" : ""}>
            <path d={HEART_PATH} fill="url(#heart-inner)" />

            <g clipPath="url(#heart-clip)">
              {rows.map(({ i, y }) => {
                const isCenter = i === centerIdx;
                const op = isCenter ? 1 : 0.72 - Math.abs(i - centerIdx) * 0.008;
                const delay = (i / density) * 1.8 + 0.4;
                const text = isCenter ? phrase : longLine;
                const size = isCenter ? fontSize * 1.35 : fontSize;
                return (
                  <text
                    key={i}
                    x="400"
                    y={y}
                    textAnchor="middle"
                    className={`row ${fontClass}`}
                    fill="url(#row-grad)"
                    style={{
                      fontSize: `${size}px`,
                      letterSpacing,
                      animationDelay: `${delay}s`,
                      "--row-op": op,
                    }}
                  >
                    {text}
                  </text>
                );
              })}
            </g>

            {t.showOutline && (
              <path
                d={BORDER_PATH}
                className="outline"
                style={{ stroke: palette.ink }}
              />
            )}

            <text className={`border-text ${fontClass}`} fill={palette.ink} fontSize="13" opacity="0.45">
              <textPath href="#border-curve" startOffset="0">
                {(phrase + " ♥ ").repeat(14)}
              </textPath>
            </text>
          </g>
        </svg>
      </div>

      {t.showPetals && <Petals color={palette.accent} key={palette.name} />}

      <TweaksPanel title="Tweaks">
        <TweakSection label="Words" />
        <TweakSelect
          label="Phrase"
          value={t.phrase}
          options={Object.keys(PHRASES)}
          onChange={(v) => setTweak("phrase", v)}
        />
        <TweakText
          label="Custom"
          value={t.phrase}
          onChange={(v) => setTweak("phrase", v)}
        />
        <TweakText
          label="Separator"
          value={t.separator}
          onChange={(v) => setTweak("separator", v)}
        />

        <TweakSection label="Style" />
        <TweakRadio
          label="Font"
          value={t.fontStyle}
          options={["serif", "script", "sans"]}
          onChange={(v) => setTweak("fontStyle", v)}
        />
        <TweakSelect
          label="Palette"
          value={t.paletteName}
          options={PALETTES.map(p => p.name)}
          onChange={(v) => setTweak("paletteName", v)}
        />

        <TweakSection label="Shape" />
        <TweakSlider
          label="Density"
          value={t.density}
          min={10} max={48} step={1}
          onChange={(v) => setTweak("density", v)}
        />
        <TweakToggle
          label="Outline"
          value={t.showOutline}
          onChange={(v) => setTweak("showOutline", v)}
        />
        <TweakToggle
          label="Heartbeat"
          value={t.showBeat}
          onChange={(v) => setTweak("showBeat", v)}
        />
        <TweakToggle
          label="Petals"
          value={t.showPetals}
          onChange={(v) => setTweak("showPetals", v)}
        />
      </TweaksPanel>
    </>
  );
}

function Petals({ color }) {
  const petals = useMemo(() => {
    return Array.from({ length: 14 }, (_, i) => ({
      left: Math.random() * 100,
      delay: Math.random() * 14,
      duration: 10 + Math.random() * 10,
      size: 5 + Math.random() * 8,
      drift: (Math.random() - 0.5) * 60,
    }));
  }, []);
  return (
    <>
      {petals.map((p, i) => (
        <span
          key={i}
          className="petal"
          style={{
            left: `${p.left}vw`,
            width: `${p.size}px`,
            height: `${p.size}px`,
            background: color,
            animationDelay: `${p.delay}s`,
            animationDuration: `${p.duration}s`,
            transform: `translateX(${p.drift}px)`,
          }}
        />
      ))}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Heart />);
</script>

</body>
</html>

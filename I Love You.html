<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>I love you</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=Inter:wght@300;400;500&family=Caveat:wght@400;500;700&display=swap" rel="stylesheet" />

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
    overflow: hidden;
    transition: background 0.8s ease;
    -webkit-font-smoothing: antialiased;
  }

  .stage {
    position: fixed;
    inset: 0;
    display: grid;
    place-items: center;
    background: radial-gradient(ellipse at 50% 45%, var(--bg-hi) 0%, var(--bg) 70%);
    transition: background 0.8s ease;
  }

  .heart-wrap {
    position: relative;
    width: min(92vw, 86vh * (800/720));
    aspect-ratio: 800 / 720;
    filter: drop-shadow(0 30px 60px rgba(0,0,0,.08));
  }


  .heart-svg { width: 100%; height: 100%; display: block; overflow: visible; }

  /* Heartbeat — subtle, double-pulse */
  .beat { transform-origin: 400px 380px; animation: beat 1.6s ease-in-out infinite; animation-delay: 4s; }
  @keyframes beat {
    0%, 18%, 36%, 100% { transform: scale(1); }
    10%   { transform: scale(1.018); }
    26%   { transform: scale(1.028); }
  }

  /* Outline stroke draw-in */
  .outline {
    fill: none;
    stroke: var(--ink);
    stroke-width: 1.25;
    stroke-linecap: round;
    stroke-linejoin: round;
    stroke-dasharray: 2350;
    stroke-dashoffset: 2350;
    animation: draw 3.4s cubic-bezier(.65,.05,.36,1) forwards;
    opacity: .55;
  }
  @keyframes draw { to { stroke-dashoffset: 0; } }

  /* Each row of text fades in */
  .row {
    opacity: 0;
    animation: fadeRow .9s ease-out forwards;
  }
  @keyframes fadeRow {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: var(--row-op, 1); transform: translateY(0); }
  }

  /* The flowing border phrase */
  .border-text {
    opacity: 0;
    animation: fadeIn 1.2s ease 3.2s forwards;
    letter-spacing: .12em;
  }
  @keyframes fadeIn { to { opacity: 1; } }

  /* Page chrome — hidden until heart phase */
  .page-title, .page-foot { opacity: 0; transition: opacity 1.2s ease 1s; }
  body.phase-heart .page-title { opacity: .55; }
  body.phase-heart .page-foot  { opacity: .35; }

  .page-title {
    position: fixed; top: 24px; left: 28px; right: 28px;
    display: flex; justify-content: space-between; align-items: baseline;
    pointer-events: none;
    color: var(--ink);
    z-index: 5;
  }
  .page-title .brand {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 18px;
    letter-spacing: .02em;
  }
  .page-title .meta {
    font-size: 11px;
    letter-spacing: .22em;
    text-transform: uppercase;
    font-weight: 400;
  }
  .page-foot {
    position: fixed; bottom: 22px; left: 0; right: 0;
    text-align: center; color: var(--ink);
    font-size: 10px; letter-spacing: .3em; text-transform: uppercase;
    pointer-events: none;
    z-index: 5;
  }

  /* ────────────────────────────────────────────
     INTRO SCENE
     ──────────────────────────────────────────── */
  .intro {
    position: fixed; inset: 0;
    display: grid; place-items: center;
    background: radial-gradient(ellipse at 50% 50%, var(--bg-hi) 0%, var(--bg) 75%);
    z-index: 20;
    text-align: center;
    transition: opacity .9s ease, transform 1.2s cubic-bezier(.65,.05,.36,1), filter .9s ease;
  }
  .intro.is-leaving {
    opacity: 0;
    transform: scale(1.06);
    filter: blur(8px);
    pointer-events: none;
  }

  .intro-inner {
    display: flex; flex-direction: column; align-items: center; gap: 26px;
    padding: 0 24px;
    max-width: 640px;
  }

  .intro-eyebrow {
    font-size: 11px;
    letter-spacing: .42em;
    text-transform: uppercase;
    color: var(--ink);
    opacity: 0;
    animation: introUp .9s ease .2s forwards;
  }

  .intro-title {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 500;
    font-size: clamp(46px, 9vw, 108px);
    line-height: .98;
    color: var(--ink);
    margin: 0;
    letter-spacing: -.01em;
    opacity: 0;
    animation: introUp 1.1s cubic-bezier(.2,.7,.2,1) .4s forwards;
  }
  .intro-title .amp {
    display: inline-block;
    color: var(--accent);
    transform: translateY(.08em);
  }

  .intro-sub {
    font-family: 'Inter', system-ui, sans-serif;
    font-weight: 300;
    font-size: 15px;
    line-height: 1.6;
    color: var(--ink);
    opacity: 0;
    max-width: 360px;
    animation: introUp .9s ease .7s forwards;
  }
  .intro-sub strong { font-weight: 500; opacity: .85; }

  .intro-cta {
    position: relative;
    appearance: none;
    border: 1px solid var(--ink);
    background: transparent;
    color: var(--ink);
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: .28em;
    text-transform: uppercase;
    padding: 16px 34px 15px;
    cursor: pointer;
    border-radius: 999px;
    overflow: hidden;
    transition: color .35s ease, transform .25s ease, border-color .35s ease;
    opacity: 0;
    animation: introUp .9s ease 1s forwards;
    margin-top: 6px;
  }
  .intro-cta::before {
    content: "";
    position: absolute; inset: 0;
    background: var(--ink);
    transform: scaleX(0);
    transform-origin: left center;
    transition: transform .45s cubic-bezier(.65,.05,.36,1);
    z-index: -1;
  }
  .intro-cta:hover {
    color: var(--bg);
    transform: translateY(-1px);
  }
  .intro-cta:hover::before { transform: scaleX(1); }
  .intro-cta:active { transform: translateY(0); }
  .intro-cta .ico {
    display: inline-block;
    margin-left: 10px;
    transition: transform .35s ease;
  }
  .intro-cta:hover .ico { transform: translateX(4px); }

  /* tiny pre-heart icon that becomes the real heart */
  .intro-seed {
    width: 14px; height: 14px;
    background: var(--accent);
    border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
    position: relative;
    transform: rotate(-45deg);
    margin-bottom: 4px;
    opacity: 0;
    animation: introUp .9s ease 0s forwards, seedBeat 1.4s ease-in-out 1.4s infinite;
  }
  .intro-seed::before, .intro-seed::after {
    content: ""; position: absolute;
    width: 14px; height: 14px;
    background: inherit;
    border-radius: 50%;
  }
  .intro-seed::before { top: -7px; left: 0; }
  .intro-seed::after  { left: 7px; top: 0; }
  @keyframes seedBeat {
    0%, 100% { transform: rotate(-45deg) scale(1); }
    20%      { transform: rotate(-45deg) scale(1.18); }
    40%      { transform: rotate(-45deg) scale(.96); }
    60%      { transform: rotate(-45deg) scale(1.1); }
  }

  @keyframes introUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ────────────────────────────────────────────
     HEART REVEAL — wraps the heart after intro
     ──────────────────────────────────────────── */
  .heart-wrap {
    opacity: 0;
    transform: scale(.4);
    transform-origin: center 56%;
    transition: opacity 1.4s ease, transform 1.6s cubic-bezier(.2,.8,.2,1);
  }
  body.phase-heart .heart-wrap {
    opacity: 1;
    transform: scale(1);
  }
  /* Defer row/outline/border animations until heart phase */
  .row, .outline, .border-text { animation-play-state: paused; }
  body.phase-heart .row,
  body.phase-heart .outline,
  body.phase-heart .border-text { animation-play-state: running; }
  body.phase-heart .beat { /* heartbeat kicks in normally via its own delay */ }

  /* Floating petals */
  .petal {
    position: fixed;
    width: 8px; height: 8px;
    background: var(--accent);
    border-radius: 50% 0 50% 50%;
    opacity: 0;
    pointer-events: none;
    animation: float 14s linear infinite;
    z-index: 1;
  }
  @keyframes float {
    0%   { transform: translateY(110vh) rotate(0deg) scale(.6); opacity: 0; }
    10%  { opacity: .35; }
    90%  { opacity: .35; }
    100% { transform: translateY(-20vh) rotate(540deg) scale(1); opacity: 0; }
  }

  /* Font flavors */
  .font-serif  { font-family: 'Cormorant Garamond', 'Times New Roman', serif; font-style: italic; font-weight: 500; }
  .font-script { font-family: 'Caveat', 'Brush Script MT', cursive; font-weight: 500; }
  .font-sans   { font-family: 'Inter', system-ui, sans-serif; font-weight: 400; letter-spacing: .02em; }
</style>
</head>
<body>

<!-- INTRO SCENE — shown first; click button to reveal heart -->
<div class="intro" id="intro">
  <div class="intro-inner">
    <div class="intro-seed" aria-hidden="true"></div>
    <div class="intro-eyebrow">a small thing · made for you</div>
    <h1 class="intro-title">
      Three words,<br/>
      <span class="amp">one</span> shape.
    </h1>
    <p class="intro-sub">
      Press the button. The page will quiet, and a heart will draw itself —
      letter by letter — from the only sentence that matters.
    </p>
    <button type="button" class="intro-cta" id="reveal-btn" aria-label="Reveal the heart">
      Reveal it <span class="ico" aria-hidden="true">→</span>
    </button>
  </div>
</div>

<div class="page-title">
  <div class="brand">a letter, in one shape</div>
  <div class="meta">∞ · for you</div>
</div>

<div class="stage" id="stage">
  <div id="root"></div>
</div>

<div class="page-foot">made with care — drag tweaks to remix</div>

<script>
  // Intro → heart transition. Outside React so it runs immediately,
  // before React has finished hydrating.
  (function(){
    var btn   = document.getElementById('reveal-btn');
    var intro = document.getElementById('intro');
    function reveal(){
      if (document.body.classList.contains('phase-heart')) return;
      intro.classList.add('is-leaving');
      // Start heart reveal slightly before the intro fully clears
      setTimeout(function(){
        document.body.classList.add('phase-heart');
      }, 320);
      setTimeout(function(){
        intro.style.display = 'none';
      }, 1300);
    }
    btn.addEventListener('click', reveal);
    // Allow Enter / Space anywhere on intro
    document.addEventListener('keydown', function(e){
      if (document.body.classList.contains('phase-heart')) return;
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); reveal(); }
    });
  })();
</script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" data-presets="react" src="heart.js"></script>

</body>
</html>
